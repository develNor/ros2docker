coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        only_pulls: true
        flags:
          - nondocker
    patch:
      default:
        target: 100%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true
        flags:
          - nondocker
