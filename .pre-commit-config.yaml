repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^src/ros2docker/resources/examples/ros2docker\.json$
      - id: check-merge-conflict
      - id: debug-statements

  # Keep this rev in sync with the `ruff==` pin in pyproject.toml `[dev]`, so
  # pre-commit and `just lint`/`just format` run the identical ruff version.
  # tests/contract/test_tooling_versions.py enforces this invariant.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # actionlint lints GitHub Actions workflows. The docker hook bundles
  # shellcheck/pyflakes, matching the workflow-lint CI job, and needs no local
  # Go or binary install. Keep the rev in sync with the pinned CI version.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint-docker

  # hadolint lints the packaged Dockerfile. The docker hook needs no local
  # install; intentional rule ignores live in .hadolint.yaml with reasons. The
  # build-lint CI job runs this same hook, so the pinned rev is the version.
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        files: ^src/ros2docker/resources/build/Dockerfile\.generic$

  # shellcheck lints the packaged entrypoint (and any other shipped shell). The
  # docker hook needs no local install; the build-lint CI job runs it too.
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        files: ^src/ros2docker/resources/build/.*\.sh$
