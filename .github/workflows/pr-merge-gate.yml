name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  merge-lightweight:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Required lightweight checks
        run: |
          just lint
          just typecheck
          just test-nondocker-cov
          just docs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          disable_search: true
          fail_ci_if_error: true
          flags: nondocker
          name: python-3.12
          token: ${{ secrets.CODECOV_TOKEN }}

  package:
    name: package
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Validate package
        run: just package

  fast-e2e:
    name: fast-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Show Docker environment
        run: docker info

      - name: Run fast E2E
        run: just test-e2e-fast

  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
    env:
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint

      - name: Lint GitHub Actions workflows
        # shellcheck is preinstalled on ubuntu-latest; actionlint runs it on run blocks.
        run: actionlint -color

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    # Only pull_request and merge_group events expose a dependency diff to review.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development

  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: [merge-lightweight, package, fast-e2e, workflow-lint, dependency-review]
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)

    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.merge-lightweight.result }}" != "success" ]]; then
            echo "merge-lightweight failed or was skipped: ${{ needs.merge-lightweight.result }}"
            exit 1
          fi
          if [[ "${{ needs.workflow-lint.result }}" != "success" ]]; then
            echo "workflow-lint failed or was skipped: ${{ needs.workflow-lint.result }}"
            exit 1
          fi
          if [[ "${{ needs.package.result }}" != "success" ]]; then
            echo "package failed or was skipped: ${{ needs.package.result }}"
            exit 1
          fi
          if [[ "${{ needs.fast-e2e.result }}" != "success" ]]; then
            echo "fast-e2e failed or was skipped: ${{ needs.fast-e2e.result }}"
            exit 1
          fi
          # dependency-review is skipped on direct pushes to main (no PR diff to
          # review); only fail the gate when it actually ran and reported a problem.
          if [[ "${{ needs.dependency-review.result }}" == "failure" || "${{ needs.dependency-review.result }}" == "cancelled" ]]; then
            echo "dependency-review failed: ${{ needs.dependency-review.result }}"
            exit 1
          fi
          echo "ci-success passed"
