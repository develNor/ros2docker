name: Docker E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: E2E suite to run
        required: true
        default: fast
        type: choice
        options:
          - fast
          - all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-e2e:
    name: Docker E2E (${{ inputs.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show Docker environment
        run: docker info

      - name: Run fast Docker E2E
        if: ${{ inputs.suite == 'fast' }}
        run: ROS2DOCKER_RUN_E2E=1 python -m pytest -q tests/e2e -m "e2e and not slow"

      - name: Run all Docker E2E
        if: ${{ inputs.suite == 'all' }}
        run: ROS2DOCKER_RUN_E2E=1 ROS2DOCKER_RUN_SLOW_E2E=1 python -m pytest -q tests/e2e -m e2e
