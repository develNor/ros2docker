name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .
          python -m py_compile src/ros2docker/*.py

      - name: Typecheck
        run: python -m mypy

      - name: Unit tests
        run: python -m pytest -q tests/unit

      - name: Contract tests
        run: python -m pytest -q tests/contract

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build and validate distributions
        run: |
          rm -rf build dist src/*.egg-info
          python -m build
          python -m twine check dist/*
          check-wheel-contents dist/*.whl

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ros2docker-dist
          path: dist/*

  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: [python, package]
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          if [[ "${{ needs.python.result }}" != "success" ]]; then
            echo "python failed: ${{ needs.python.result }}"
            exit 1
          fi
          if [[ "${{ needs.package.result }}" != "success" ]]; then
            echo "package failed: ${{ needs.package.result }}"
            exit 1
          fi
