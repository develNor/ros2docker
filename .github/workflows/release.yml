name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  non-docker:
    name: non-docker (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Run non-Docker checks
        run: |
          just lint
          just typecheck
          just test-unit
          just test-contract
          just docs

  package:
    name: package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Build and validate distributions
        run: just package

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  fast-e2e:
    name: fast-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Show Docker environment
        run: docker info

      - name: Run fast E2E
        run: just test-e2e-fast

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: [non-docker, package, fast-e2e]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/ros2docker
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Remove checksum sidecar
        run: rm -f dist/SHA256SUMS

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: publish-testpypi
    runs-on: ubuntu-latest
    needs: [non-docker, package, fast-e2e]
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ros2docker
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Remove checksum sidecar
        run: rm -f dist/SHA256SUMS

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify release notes
        run: |
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "::error file=${notes_file}::Missing release notes for ${GITHUB_REF_NAME}. Copy docs/release-notes/TEMPLATE.md to this path in the release PR."
            exit 1
          fi
          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi
