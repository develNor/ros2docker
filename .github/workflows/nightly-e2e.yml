name: Nightly E2E

on:
  schedule:
    - cron: "37 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-e2e:
    name: full-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Set up local environment
        run: just setup

      - name: Show Docker environment
        run: docker info

      - name: Run full E2E
        run: just test-e2e-slow
